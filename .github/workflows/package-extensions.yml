name: Package Extensions and Update README

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # Run the unit tests first. If any test fails this job exits non-zero,
  # and the package-and-update job below (which "needs" this one) is skipped,
  # so a broken build can never be packaged or released.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  package-and-update:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # Auto-detect every subdirectory that has a manifest.json and zip it.
      # Using "zip -r dir.zip dir/" so extraction preserves the folder structure
      # (Chrome's "Load unpacked" needs a folder, not loose files).
      - name: Detect and package all extensions
        run: |
          for dir in */; do
            dir="${dir%/}"
            [ -f "${dir}/manifest.json" ] || continue
            (cd "${dir}" && zip -r "../${dir}.zip" . --exclude "DESCRIPTION.md" "DESCRIPTION.en.md" "PRIVACY.md" "STORE_LISTING.md" "ROADMAP.md" "preview.html")
            echo "Packaged: ${dir}.zip"
          done

      # Regenerate README from manifest.json + DESCRIPTION.md in each extension folder.
      # Adding a new extension? Just create its folder — this script finds it automatically.
      - name: Generate README.md
        run: python3 .github/scripts/generate_readme.py

      # Commit the updated README back to main.
      # "[skip ci]" prevents this commit from re-triggering the workflow.
      - name: Commit README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README.zh-TW.md
          git diff --staged --quiet || (
            git commit -m "docs: auto-update README [skip ci]" && git push
          )

      # Create or overwrite the "latest" GitHub Release with all packaged ZIPs.
      - name: Create or update "latest" release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          body: |
            每次推送到 main 自動更新。

            ## 安裝方式
            1. 點下方連結下載 `.zip` 並解壓縮
            2. 開啟 Chrome → `chrome://extensions/`
            3. 開啟右上角**開發人員模式**
            4. 點選**載入未封裝項目** → 選擇解壓縮後的資料夾
          files: "*.zip"
          make_latest: true
